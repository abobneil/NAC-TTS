name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r services/api/requirements.txt

      - name: Run backend tests
        run: python -m pytest tests/common/test_database.py tests/api/test_api.py tests/worker/test_worker.py tests/integration/test_end_to_end.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Run browser smoke test
        working-directory: apps/web
        run: npm run test:e2e
