services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/db/nac_tts.sqlite3}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      STORAGE_ROOT: /data
    depends_on:
      - redis
    volumes:
      - ../../storage:/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ready', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/db/nac_tts.sqlite3}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      STORAGE_ROOT: /data
      KOKORO_DEVICE: "${KOKORO_DEVICE:-cuda}"
    depends_on:
      - redis
      - api
    volumes:
      - ../../storage:/data
    gpus: all
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, sys, time; from redis import Redis; queue = os.environ.get('QUEUE_NAME', 'tts:jobs'); ttl = int(os.environ.get('WORKER_HEARTBEAT_TTL_SECONDS', '30')); raw = Redis.from_url(os.environ['REDIS_URL'], decode_responses=True).get(f'{queue}:worker:heartbeat'); sys.exit(0 if raw and time.time() - float(raw) <= ttl else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      - api
    ports:
      - "${APP_PORT:-8080}:8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ../../cloudflared:/etc/cloudflared:ro
    depends_on:
      - caddy
